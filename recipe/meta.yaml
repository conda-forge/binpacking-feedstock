{% set name = "binpacking" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bd62a7e2780366d9067eecca38922624126a0172c796b077b656a547da202354

build:
  number: 0
  entry_points:
    - binpacking = binpacking.binpacking_binary:main
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir

requirements:
  host:
    - pip
    - python {{ python_min }}
    - pytest-runner
  run:
    - pip
    - python >={{ python_min }}
    - numpy
    - future

test:
  requires:
    - python {{ python_min }}
  imports:
    - binpacking
  commands:
    - binpacking --help

about:
  home: https://www.github.com/benmaier/binpacking
  license: MIT
  license_family: MIT
  license_file: LICENSE.in
  summary: Heuristic distribution of weighted items to bins (either a fixed number of bins or a fixed number of volume per bin). Data may be in form of list, dictionary, list of tuples or csv-file.

extra:
  recipe-maintainers:
    - benmaier
    - pirovc
